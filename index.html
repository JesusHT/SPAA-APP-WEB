<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - SPAA</title>
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <!-- Agrega la biblioteca de Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"> <!-- Tu archivo de estilos -->
</head>
<body>
  <div class="container">
    <div class="row login-container">
      <div class="col-md-6">
        <!-- Imagen alusiva al objetivo de la aplicación -->
        <img src="./images/loginSplash.png" alt="Objetivo de la aplicación" class="img-fluid login-image">
      </div>
      <div class="col-md-6 login-form-container">
        <!-- Formulario de inicio de sesión -->
        <div class="login-form">
          <!-- Logo y texto de bienvenida -->
          <div class="text-center mb-4">
            <img src="./images/favicon.ico" alt="Logo" class="img-fluid">
            <h4 class="mt-3">¡Bienvenido!</h4>
          </div>
          <h2 class="text-center mb-4">Iniciar sesión</h2>
          <form id="loginForm">
            <div class="form-group">
              <label for="username">Usuario</label>
              <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group">
              <label for="password">Contraseña</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts de Bootstrap, jQuery y Font Awesome -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script> <!-- Font Awesome JS -->
  <script src="script.js"></script> <!-- Tu JavaScript personalizado -->
</body>
</html>
